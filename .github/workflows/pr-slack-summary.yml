name: PR → Slack summary

# Open: PR body summary (not AI) + optional Dependabot AI for breaking changes.
# Merge: compact message with code labels.

on:
  workflow_call:
    secrets:
      SLACK_WEBHOOK_URL:
        required: true
      OPENROUTER_API_KEY:
        required: true
      SLACK_BOT_TOKEN:
        required: false
      SLACK_CHANNEL_ID:
        required: false
    inputs:
      model:
        type: string
        default: "google/gemini-3.1-flash-lite"
        description: "OpenRouter model slug"

permissions:
  contents: read
  pull-requests: read

jobs:
  notify:
    if: |
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      (github.event.action != 'closed' || github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    steps:
      - name: Collect PR metadata
        id: ctx
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          EVENT_ACTION: ${{ github.event.action }}
        run: |
          set -euo pipefail

          gh pr view "$PR_NUMBER" --repo "$GH_REPO" \
            --json title,number,body,author,labels,commits,additions,deletions,changedFiles,mergeable,mergeStateStatus,headRefOid,closingIssuesReferences,url \
            > pr.json

          jq -n \
            --slurpfile pr pr.json \
            --arg repo "$GH_REPO" \
            --arg action "$EVENT_ACTION" \
            '($pr[0]) as $p |
            ($p.body // "") as $raw |
            ($raw | gsub("<!--[\\s\\S]*?-->"; "")) as $body |
            (if ($body | test("(?i)##[[:space:]]*Summary")) then
              (($body | split("## Summary")[1]) // ($body | split("## summary")[1]) // "" | split("\n##")[0] | gsub("^[[:space:]]+|[[:space:]]+$"; ""))
            elif ($body | test("(?i)##[[:space:]]*Description")) then
              (($body | split("## Description")[1]) // ($body | split("## description")[1]) // "" | split("\n##")[0] | gsub("^[[:space:]]+|[[:space:]]+$"; ""))
            else
              ($body | split("\n\n")[0] // "")
            end // "" | gsub("^[[:space:]\n]+|[[:space:]\n]+$"; "")) as $summary_raw |
            ([$p.closingIssuesReferences[]? | "#\(.number)"] +
              ([$body | scan("#[0-9]+")] | unique)) as $issue_refs |
            (if $p.mergeStateStatus == "DIRTY" then "Conflicts"
             elif $action == "closed" then "Merged"
             else "Open" end) as $status |
            {
              repo: $repo,
              repo_short: ($repo | split("/")[1]),
              number: $p.number,
              title: $p.title,
              url: $p.url,
              review_url: ($p.url + "/files"),
              author: $p.author.login,
              status: $status,
              head_sha: ($p.headRefOid[0:7]),
              labels: [$p.labels[] | .name],
              related_issues: $issue_refs,
              commit_count: ($p.commits | length),
              changed_files: $p.changedFiles,
              additions: $p.additions,
              deletions: $p.deletions,
              body: $body,
              pr_summary: (if ($summary_raw | length) > 0 then $summary_raw[0:3000] else "_No PR description provided._" end),
              is_dependabot: (($p.author.login | test("dependabot"; "i")) or
                (([$p.labels[] | .name] | index("dependencies")) != null))
            }' > meta.json

          jq -n \
            --slurpfile meta meta.json \
            '($meta[0].body // "") as $body |
            ([$body | scan("(?i)BREAKING CHANGE[^\\n]*"; "g")]
              + [$body | scan("(?i)\\bfeat!\\b[^\\n]*"; "g")]
              + [$body | scan("(?i)\\bfix!\\b[^\\n]*"; "g")]) as $markers |
            { breaking_changes: ($markers | unique), documentation_links: [] }' \
            > human-detected.json

          if [[ "$(jq -r '.is_dependabot' meta.json)" == "true" ]]; then
            jq -n \
              --slurpfile meta meta.json \
              '($meta[0].body // "") as $body |
              ([$body | scan("from ([0-9]+)\\.[0-9]+\\.[0-9]+ to ([0-9]+)\\.[0-9]+\\.[0-9]+"; "g")]
                | map(select((.[0] | tonumber) < (.[1] | tonumber)))
                | map("Major version bump: v" + .[0] + ".x.x → v" + .[1] + ".x.x")) as $majors |
              ([$body | scan("https?://[^\\s)>\"]+"; "g")] | unique) as $urls |
              { breaking_changes: $majors, documentation_links: $urls }' \
              > dependabot-detected.json
          else
            echo '{"breaking_changes":[],"documentation_links":[]}' > dependabot-detected.json
          fi

          if [[ "$EVENT_ACTION" == "closed" ]]; then
            echo "event_type=merged" >> "$GITHUB_OUTPUT"
          else
            echo "event_type=opened" >> "$GITHUB_OUTPUT"
          fi

          echo "is_dependabot=$(jq -r '.is_dependabot' meta.json)" >> "$GITHUB_OUTPUT"

      - name: Analyze Dependabot breaking changes (AI)
        if: steps.ctx.outputs.event_type == 'opened'
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          MODEL: ${{ inputs.model }}
        run: |
          set -euo pipefail

          if [[ "$(jq -r '.is_dependabot' meta.json)" != "true" ]]; then
            echo '{"breaking_changes":[],"documentation_links":[]}' > ai.json
            exit 0
          fi

          SYSTEM="You analyze a Dependabot dependency pull request body. Emit STRICT JSON only with fields: breaking_changes (array of bullets — list EVERY major semver bump and known breaking API change; do not miss any), documentation_links (array of changelog, migration guide, and release-note URLs found in the body). Do not mention Slack, chat channels, notifications, or where output is displayed. Analyze only the PR content. English only. No markdown in string values."

          PAYLOAD=$(jq -n \
            --arg system "$SYSTEM" \
            --slurpfile meta meta.json \
            --arg model "$MODEL" \
            '{ model: $model, response_format: {type: "json_object"},
               messages: [{role: "system", content: $system},
                 {role: "user", content: (($meta[0].body[0:12000]) // "")}]}')

          for attempt in 1 2 3; do
            HTTP_CODE=$(curl -sS -o response.json -w '%{http_code}' \
              https://openrouter.ai/api/v1/chat/completions \
              -H "Authorization: Bearer $OPENROUTER_API_KEY" \
              -H "Content-Type: application/json" \
              -H "HTTP-Referer: https://github.com/backendforth" \
              -H "X-Title: PR Slack Analysis" \
              -d "$PAYLOAD")
            if [[ "$HTTP_CODE" == "200" ]]; then break; fi
            if [[ $attempt -lt 3 && "$HTTP_CODE" -ge 500 ]]; then sleep 5; continue; fi
            exit 1
          done

          jq -r '.choices[0].message.content' response.json | sed -E 's/^```(json)?//; s/```$//' > ai-raw.json
          jq '{breaking_changes: (.breaking_changes // []), documentation_links: (.documentation_links // [])}' ai-raw.json > ai.json 2>/dev/null || echo '{"breaking_changes":[],"documentation_links":[]}' > ai.json

      - name: Assemble analysis
        if: steps.ctx.outputs.event_type == 'opened'
        run: |
          set -euo pipefail
          IS_DEP=$(jq -r '.is_dependabot' meta.json)

          if [[ "$IS_DEP" == "true" ]] && [[ -f ai.json ]]; then
            jq -s '
              .[0] as $ai | .[1] as $det | .[2] as $hum |
              {
                breaking_changes: ((($hum.breaking_changes // []) + ($ai.breaking_changes // []) + ($det.breaking_changes // [])) | unique),
                documentation_links: ((($ai.documentation_links // []) + ($det.documentation_links // [])) | unique)
              }' human-detected.json ai.json dependabot-detected.json > analysis.json
          else
            jq -s '
              .[0] as $hum | .[1] as $det |
              {
                breaking_changes: ((($hum.breaking_changes // []) + ($det.breaking_changes // [])) | unique),
                documentation_links: ($det.documentation_links // [])
              }' human-detected.json dependabot-detected.json > analysis.json
          fi

      - name: Build Slack payload (opened)
        if: steps.ctx.outputs.event_type == 'opened'
        run: |
          set -euo pipefail

          jq -n \
            --slurpfile meta meta.json \
            --slurpfile analysis analysis.json \
            '
            def slack_code($s): "`" + $s + "`";
            def slack_codeblock($s): "```\n" + $s + "\n```";
            def slack_link_code($url; $s): "<" + $url + "|`" + $s + "`>";
            def claude_ping($m):
              "<@U0BAPTE85TL> Please review this Dependabot PR in " + slack_code($m.repo) + ": " +
              "<" + $m.url + "|" + $m.title + " #" + ($m.number | tostring) + ">. " +
              "Assess breaking changes, security impact, and whether auto-merge is safe.";
            ($meta[0]) as $m |
            ($analysis[0]) as $a |
            (if ($m.labels | length) > 0
              then ([$m.labels[] | "`" + . + "`"] | join(" "))
              else "_none_" end) as $tags |
            (if ($m.related_issues | length) > 0
              then ($m.related_issues | join(", "))
              else "_none_" end) as $issues |
            (if ($a.breaking_changes | length) > 0
              then ([$a.breaking_changes[] | "- " + .] | join("\n"))
              else "_None_" end) as $breaking |
            (if $m.is_dependabot then "439FE0" else "2EB67D" end) as $accent |
            { attachments: [
              { color: $accent, blocks: (
                [
                  { type: "section", text: { type: "mrkdwn", text:
                    ("➔ New PR " + slack_link_code($m.url; $m.title + " #" + ($m.number | tostring)) + "\n" +
                     slack_code($m.repo)) } },
                  { type: "section", text: { type: "mrkdwn", text:
                    ("*Status:* " + $m.status + "\n" +
                     "*Opener:* `" + $m.author + "` · *Latest commit:* `" + $m.head_sha + "` · *Tags:* " + $tags + " · *Related issues:* " + $issues + "\n" +
                     "*Commits:* " + ($m.commit_count | tostring) + "\n" +
                     "*Files:* " + ($m.changed_files | tostring) + " changed · *Lines:* +" + ($m.additions | tostring) + " / −" + ($m.deletions | tostring)) } },
                  { type: "divider" },
                  { type: "section", text: { type: "mrkdwn",
                    text: ("*Summary*\n" + (slack_codeblock($m.pr_summary))) } },
                  { type: "section", text: { type: "mrkdwn",
                    text: ("*Breaking changes*\n" + (slack_codeblock($breaking))) } }
                ]
                + (if (($a.breaking_changes | length) > 0) and (($a.documentation_links | length) > 0) then
                    [{ type: "section", text: { type: "mrkdwn",
                      text: ("*Documentation*\n" +
                        ([$a.documentation_links[] | "- <" + . + "|" + . + ">"] | join("\n"))) } }]
                  else [] end)
                + (if $m.is_dependabot then
                    [{ type: "section", text: { type: "mrkdwn",
                      text: ("*Claude review*\n" + claude_ping($m)) } }]
                  else [] end)
                + [{ type: "actions", elements: [
                    { type: "button", text: { type: "plain_text", text: "View PR" }, url: $m.url },
                    { type: "button", text: { type: "plain_text", text: "Start review" },
                      url: $m.review_url, style: "primary" }
                  ]}]
              ) }
            ] }' > slack.json

          cat slack.json

      - name: Build Slack payload (merged)
        if: steps.ctx.outputs.event_type == 'merged'
        env:
          REPO_URL: ${{ github.event.repository.html_url }}
        run: |
          set -euo pipefail

          jq -n \
            --slurpfile meta meta.json \
            --arg repo_url "$REPO_URL" \
            '
            def slack_code($s): "`" + $s + "`";
            def slack_link_code($url; $s): "<" + $url + "|`" + $s + "`>";
            ($meta[0]) as $m |
            (if $m.is_dependabot then "439FE0" else "9B59B6" end) as $accent |
            { attachments: [
              { color: $accent, blocks: (
                [
                  { type: "section", text: { type: "mrkdwn",
                    text: ("⤴ Merged PR " + slack_link_code($m.url; $m.title + " #" + ($m.number | tostring)) + "\n" +
                      slack_code($m.repo)) } },
                  { type: "actions", elements: [
                    { type: "button", text: { type: "plain_text", text: "View repo" }, url: $repo_url },
                    { type: "button", text: { type: "plain_text", text: "View PR" }, url: $m.url, style: "primary" }
                  ]}
                ]
              ) }
            ] }' > slack.json

          cat slack.json

      - name: Post to Slack
        id: slack_post
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: |
          set -euo pipefail

          if [[ -n "${SLACK_BOT_TOKEN}" && -n "${SLACK_CHANNEL_ID}" ]]; then
            jq -n --arg channel "$SLACK_CHANNEL_ID" --slurpfile body slack.json \
              '$body[0] + {channel: $channel}' > slack-post.json

            RESPONSE=$(curl -sS -X POST https://slack.com/api/chat.postMessage \
              -H "Authorization: Bearer ${SLACK_BOT_TOKEN}" \
              -H "Content-Type: application/json; charset=utf-8" \
              -d @slack-post.json)

            if [[ "$(echo "$RESPONSE" | jq -r '.ok')" != "true" ]]; then
              echo "chat.postMessage failed: $(echo "$RESPONSE" | jq -r '.error')" >&2
              exit 1
            fi

            echo "mode=bot" >> "$GITHUB_OUTPUT"
            echo "message_ts=$(echo "$RESPONSE" | jq -r '.ts')" >> "$GITHUB_OUTPUT"
            echo "Posted via Slack Bot API (enables reactions)."
          else
            HTTP_CODE=$(curl -sS -o slack-response.txt -w '%{http_code}' \
              -H 'Content-Type: application/json' \
              -d @slack.json \
              "$SLACK_WEBHOOK_URL")

            if [[ "$HTTP_CODE" != "200" ]]; then
              echo "Webhook failed with HTTP ${HTTP_CODE}: $(cat slack-response.txt)" >&2
              exit 1
            fi

            echo "mode=webhook" >> "$GITHUB_OUTPUT"
            echo "Posted via incoming webhook (reactions need SLACK_BOT_TOKEN + SLACK_CHANNEL_ID)."
          fi

      - name: Add Slack reaction
        if: steps.slack_post.outputs.mode == 'bot'
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          MESSAGE_TS: ${{ steps.slack_post.outputs.message_ts }}
          EVENT_TYPE: ${{ steps.ctx.outputs.event_type }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_TYPE" == "merged" ]]; then
            EMOJI="white_check_mark"
          elif [[ "$(jq -r '.is_dependabot' meta.json)" == "true" ]]; then
            EMOJI="package"
          else
            EMOJI="eyes"
          fi

          PAYLOAD=$(jq -n \
            --arg channel "$SLACK_CHANNEL_ID" \
            --arg timestamp "$MESSAGE_TS" \
            --arg name "$EMOJI" \
            '{channel: $channel, timestamp: $timestamp, name: $name}')

          RESPONSE=$(curl -sS -X POST https://slack.com/api/reactions.add \
            -H "Authorization: Bearer ${SLACK_BOT_TOKEN}" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$PAYLOAD")

          if [[ "$(echo "$RESPONSE" | jq -r '.ok')" != "true" ]]; then
            ERROR=$(echo "$RESPONSE" | jq -r '.error')
            if [[ "$ERROR" == "already_reacted" ]]; then
              echo "Reaction :${EMOJI}: already present."
              exit 0
            fi
            echo "reactions.add failed: ${ERROR}" >&2
            exit 1
          fi

          echo "Added reaction :${EMOJI}:"
