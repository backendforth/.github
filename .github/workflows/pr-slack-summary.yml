name: PR → Slack summary

# Reusable workflow: posts an AI-summarized Slack message when a PR opens,
# and a compact status-only message when it merges. Skips drafts and fork PRs.
#
# Lifecycle:
#   opened / ready_for_review → one message: title, summary, status "Offen"
#   merged                    → short status line only (no second AI call)

on:
  workflow_call:
    secrets:
      SLACK_WEBHOOK_URL:
        required: true
      OPENROUTER_API_KEY:
        required: true
    inputs:
      model:
        type: string
        default: "google/gemini-3.1-flash-lite"
        description: "OpenRouter model slug"

permissions:
  contents: read
  pull-requests: write

jobs:
  notify:
    if: |
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      (github.event.action != 'closed' || github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    steps:
      - name: Collect PR context
        id: ctx
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          gh pr view "$PR_NUMBER" --repo "$GH_REPO" \
            --json title,body,labels,files,author,baseRefName,headRefName \
            > pr.json

          jq -n \
            --slurpfile pr pr.json \
            --arg repo "$GH_REPO" \
            --arg number "$PR_NUMBER" \
            '{
              repo: $repo,
              number: ($number | tonumber),
              title: $pr[0].title,
              body: (($pr[0].body // "") | .[0:8000]),
              labels: [$pr[0].labels[].name],
              files: [$pr[0].files[] | {path, additions, deletions}],
              author: $pr[0].author.login,
              base: $pr[0].baseRefName,
              head: $pr[0].headRefName
            }' > context.json

          if [[ "${{ github.event.action }}" == "closed" ]]; then
            echo "event_type=merged" >> "$GITHUB_OUTPUT"
          else
            echo "event_type=opened" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate AI summary via OpenRouter
        if: steps.ctx.outputs.event_type == 'opened'
        id: ai
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          MODEL: ${{ inputs.model }}
        run: |
          set -euo pipefail

          SYSTEM="You analyze a GitHub pull request and emit STRICT JSON with three fields: summary (2-3 sentences describing intent and main changes, plain prose, no markdown), breaking_changes (array of bullet strings, empty if none), risk (low, medium, or high). For Dependabot PRs, scan the body for major version bumps (X.x to Y.0) and list each as a breaking change. For feature PRs, scan title and body for BREAKING CHANGE, feat!, fix!, and explicit breaking notes. Be concise and concrete. Output ONLY the JSON object, no markdown, no commentary."

          PAYLOAD=$(jq -n \
            --arg system "$SYSTEM" \
            --slurpfile ctx context.json \
            --arg model "$MODEL" \
            '{
              model: $model,
              response_format: { type: "json_object" },
              messages: [
                { role: "system", content: $system },
                { role: "user", content: ($ctx[0] | tostring) }
              ]
            }')

          for attempt in 1 2 3; do
            HTTP_CODE=$(curl -sS -o response.json -w '%{http_code}' \
              https://openrouter.ai/api/v1/chat/completions \
              -H "Authorization: Bearer $OPENROUTER_API_KEY" \
              -H "Content-Type: application/json" \
              -H "HTTP-Referer: https://github.com/backendforth" \
              -H "X-Title: PR Slack Summary" \
              -d "$PAYLOAD")

            if [[ "$HTTP_CODE" == "200" ]]; then
              break
            fi

            echo "OpenRouter returned HTTP $HTTP_CODE (attempt $attempt)"
            cat response.json || true

            if [[ $attempt -lt 3 && "$HTTP_CODE" -ge 500 ]]; then
              sleep 5
              continue
            fi

            echo "Aborting after attempt $attempt"
            exit 1
          done

          CONTENT=$(jq -r '.choices[0].message.content' response.json)
          CONTENT=$(printf '%s' "$CONTENT" | sed -E 's/^```(json)?//; s/```$//')

          if printf '%s' "$CONTENT" | jq empty 2>/dev/null; then
            printf '%s' "$CONTENT" > ai.json
          else
            echo "AI response was not valid JSON; using fallback"
            jq -n --arg s "$CONTENT" \
              '{summary: $s, breaking_changes: [], risk: "low"}' > ai.json
          fi

          jq '{
            summary: (.summary // "No summary available."),
            breaking_changes: (.breaking_changes // []),
            risk: (.risk // "low")
          }' ai.json > ai.final.json
          mv ai.final.json ai.json

      - name: Build Slack payload (opened)
        if: steps.ctx.outputs.event_type == 'opened'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail

          jq -n \
            --arg title "$PR_TITLE" \
            --arg url "$PR_URL" \
            --arg author "$PR_AUTHOR" \
            --arg repo "$REPO_NAME" \
            --slurpfile ai ai.json \
            '
            ($ai[0]) as $ai |
            { blocks:
              [
                { type: "section", text: { type: "mrkdwn",
                  text: ("*<" + $url + "|" + $title + ">*\n`" + $repo + "` · `" + $author + "`") } },
                { type: "divider" },
                { type: "section", text: { type: "mrkdwn", text: $ai.summary } }
              ]
              + (if ($ai.breaking_changes | length) > 0 then
                  [{ type: "section", text: { type: "mrkdwn",
                    text: ("⚠️ *Breaking changes*\n" +
                      ([$ai.breaking_changes[] | "• " + .] | join("\n"))) } }]
                else [] end)
              + [
                { type: "context", elements: [
                  { type: "mrkdwn", text: "📥 *Status:* Offen" }
                ] },
                { type: "actions", elements: [
                  { type: "button",
                    text: { type: "plain_text", text: "Review PR →" },
                    url: $url, style: "primary" }
                ] }
              ]
            }' > slack.json

          cat slack.json

      - name: Build Slack payload (merged)
        if: steps.ctx.outputs.event_type == 'merged'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail

          jq -n \
            --arg title "$PR_TITLE" \
            --arg url "$PR_URL" \
            --arg author "$PR_AUTHOR" \
            --arg repo "$REPO_NAME" \
            '{ blocks: [
              { type: "section", text: { type: "mrkdwn",
                text: ("✅ *Status:* Gemerged · `"
                  + $repo + "` · <" + $url + "|" + $title + "> · `" + $author + "`") } }
            ] }' > slack.json

          cat slack.json

      - name: Post to Slack
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload-file-path: ./slack.json
